body:
  text: 大慈恩寺基撰將欲辨為為二章略以五門分別一彰數定聲二依聲定訓三聲訓次第四就經分數七卷不同即分為七五申作者意第一彰數定聲有二一字數二定聲總據一部都有六百一十八字二百九十一字平聲三百二十七字去聲第二依聲定訓平聲為榮危反有九訓由求當得定被作是名去聲為榮偽反有三訓以與助第三聲訓次第然但隨其經初有彼聲即隨義訓論為次第是則聲訓始終使不相雜又復通標一句冀其文顯義彰尋之易見或在上中下也此中若同常喚但與訓之若違先所呼必為再言思義唯合博達賢德幸請詳焉第四就經分數序品常為諸佛得為諸菩薩與二為説涅槃與為説緣覺與為説淨道與為衆講法與不以為喜是為供舍利以為欲説此定為當授記定為説何等定又當與為求聲聞與為求辟支與皆為法師作所為因緣以為人演説由為廣分別與為世間眼是為汝等説與曰為淨身名號為求名作當為除斷與已上第一品二十三字九字平聲十四字去聲方便品事為云何當佛為解説與為是究竟定為是所行定為如實説與為佛長子是為此衆故與吾當為汝與當為汝説與是為諸佛名常為一事以為衆生説與而為衆生與三是法皆為以三而為説法與如此皆為以為是説涅與大乘為本與為此諸佛與為説大乘與事為不可是為説實相與為説方便與沙為佛塔與作若人為佛以實為一乘以實為佛乘以為是衆生以為諸衆生與為教菩薩以為五比丘與為説佛慧以為已供養是為諸法王是為如是等與已上第二品四十字一十字平聲三十字去聲譬喻品為自欺誑是為共為不定是為諸梵志作是魔所為作為天人所得為無上道以為諸聲聞作琉璃為地作黃金為繩作為大寶故名恆為諸佛得除為王子作為王子時作光佛所為作願為四衆與皆為阿耨以為化菩薩被為火所燒被我當為説與無令為火被何者為舍名云何為失名此舍已為被必為取焚被非為虗妄是便為已得是則為一切是為度衆生以為生老病被不以為患作我為衆生是為諸衆生而為三界被為説三乘與則為所燒被我今為汝與為求羊鹿以名為摩訶作為一切衆是為火所逼被將為火害被吾為汝等與以為茵蓐作能為救護以作我為衆生與為無有上是為此等故以為是等故以貪欲為本是為滅諦故名為解脫得我為法王是為欲利益以則為見我是為深智説與亦勿為説與又復為人被為諸童子被為諸小蟲被若得為人作二為人所使被以為衣服作乃可為説十與為一切智以作汝當為説已上第三品八十一字四十六字平聲三十五字去聲信解品何為見捉得為子名所是名之為兒作便為不異是我等為子是自以為足得作不為分別作是為諸菩薩與佛則為我與常為王者得為除冀穢與樂為鄙事作為大菩薩與但為菩薩與而不為我與自謂為足得無漏無為作二則為已得是我等雖為與能為下劣作隨宜為説與而為説法與已上第四品二十四字平聲十字去聲藥草喻品為聽法故以而為説法與不即為説與甚為希有是則為永失作隨力為説與為諸衆生與我為如來是我為世尊是為大衆説與常為大衆與恆為一切與如為一人與名為大樹作今為汝等與已上第五品一十五字五字平聲十字去聲授記品得成為佛當三琉璃為地黃金為繩作二為佛智慧以以為莊嚴作見為授記與頗梨為地作二為衆説法與皆為十方得為佛道故以常為天人與已上第六品一十一字平聲五字去聲化城喻品磨以為墨作盡末為塵作二悉以為墨作塵為一劫作先為彼佛與為供養佛以二為度衆生以為得最大當願為世間與與分別顯與為諸梵衆與四為大得天是四為佛出世是四為衆生作與為衆生之作為世間眼作而為沙彌作為我等説與為阿耨多以二為四部衆與甚為希有是以為眷屬作為沙彌時作為説是經與為是等故與為止息耳以今為汝等與為止息故以二為説汝等與為覺悟群以為宣種種與為無量億與曾亦為汝與為一切導作為息説涅與二為説真實今為汝等與為佛一切作以已上第七品五十二字二十二字平聲三十一字去聲五百弟子品所為希有作而為説法與最為第一得為淨佛土以二示為第一得為一佛土作七寶為地作為求無上以名為寶明作是等為僧作得成為佛當號為普明作當為宣説與小智為足作為衣食故以便以為足作是何為衣食以甚為癡也是為菩薩時作得少為足作是而汝謂為是自以為足作少便為足作乃為真滅是已上第八品二十五字十八字平聲七字去聲人記品等為一切是常為侍者作琉璃為地作佛為十方得方便為侍作常為諸佛與亦為此佛與為太子時作羅睺為長作受法為法名皆為其長作現為我長名為實相作已上第九品一十三字十一字平聲二字去聲法師品竊為一人與廣為人説與則為如來得二最為難信是為他人説則為以衣得被作又為他方得而為開示當知是為名二欲為四衆與應為四衆與為諸菩薩與為其集聽作我還為説與廣為分別與慈悲為室作法空為座作處此為説與為衆生説與為之作衛與爾時為現與為説今通與為四衆説與為作聽法與已上第十品二十六字平聲十六字去聲寶塔品以為嚴飾作為大衆説與為聽是經以為作證明與為聽法華以頗梨為地作以為莊嚴作為衆説法與琉璃為地作二黃為為繩作以為侍者作為莊莊嚴作通為一佛作為諸佛當以與為聽是經以尚為法來與不勤為法與為坐諸佛以則為供養是為是經故以則為見我當此為難事是未足為難是亦未為難是為衆演説與是則為難是六為人演説與我為佛道作則為疾得是已上第十一品四十五字三十字平聲十六字去聲提婆品為欲滿足以為於法故以二誰能為我與當為宣説與而為牀座作為求大法以為我解説與當為奴僕作當為汝説與為諸衆生與不為己身以為大國王作故為汝説與廣為衆生與為衆生故以普為十方普為時會與已上第十二品一十八字三字平聲十五字去聲勸持品不以為慮是為大法師作二俱為法師作願不為慮當未得謂為是為世所恭得為貪利養以為求名聞為斯所經以被為説是經以已上第十三品一十一字八字平聲三字去聲安樂行品甚為難有是能為衆生與則為説法與而為説法與二以為親厚作二若為女人與乃至為法與為聞佛道以為利殺害以為女説法與是則名為作二有為無為作二為諸國王與而為解説與隨問為説與和顏為説與不為多説與則為大失是二常為比丘得為聽法故以常為法故與為説諸經與而不為説與為大法王是最為甚深是為説此法與能為難事作為諸法王是為是衆生與是末後乃為與此經為尊是為汝等説以為給使作佛為四衆與而為供養作即為授記與聞法為人與為四衆説與已上第十四品四十四字一十七字平聲二十七字去聲涌出品最為上首是為從何所定誰為其説與為求佛道以二為太子時作為佛道故以甚為希有是願為解説與二為除衆疑與佛為未來與今為解説與已上第十五品一十三字四字平聲九字去聲壽量品彌勒為首作末為微塵作盡以為塵作為是人記皆為度脫以為度衆生以二為毒所中被為衆生故與為説無上與不為現身與乃出為説與時為此衆與為説佛難與為治狂子與亦為世人是為凡夫顛與為説種種與已上第十六品一十八字五字平聲十三字去聲分別功德品為阿耨多以與為此所輕被福為如此得則為見佛是是為深信是則為頂戴是不須為我與為已起塔是為已於無是則為起立是為他人説與又為他人與則為具足是為已如上是隨順為解與無漏無為作已上十七品一十九字十三字平聲六字去聲隨喜功德品為得幾所當為父母宗寧為多不是為是經故以為人分別與隨喜為他與為方便説與不可為譬得為人所喜得已上第十八品九字四字平聲五字去聲法師功德品若為他人與二為忉利諸與為他人説與或為人説與為聽法故以或時為現與為衆生説與為一切衆與已上第十九品九字令是去聲不輕品中為天人與為求聲聞與為求辟支與為説菩薩與為常不輕名廣為人説與是人為作與為諸四衆與為他人説與為人説故與復為諸人與已上第二十品一十一字一字平聲一十去聲神力品為諸菩薩與為囑纍故以為悅衆生以為求佛道與為已見我作已上第二十一品五字平聲四字去聲囑纍品當為演説與為令其人以則為已報是已上第二十二品三字一字平聲二字去聲藥王品七寶為臺作以為供養作佛為一切與即為其父與栴檀為𧂐作海為第一是最為深大是山為第一是最為其上是最為第一是三最為照明是最為其尊是佛為第一是亦為第一是菩薩為第是為諸法王是不復為貪被不為嗔恚被不為憍慢被為他人説與則為閻浮是作已上第二十三品二十三字二十一字平聲三字去聲妙音品為無量無以而為説法與五檀金為莖作二白銀為葉作二金剛為鬚作二以為其臺作二願為我等與當為汝等與能為供養以為諸衆生與二變為女身作而為現形與已上第二十四品二十一字九字平聲十二字去聲觀世音品若為大水破為求金銀以而為衆生與而為説法與十九為施無畏作為觀世音作我為汝略與為人所推被為作依怙與已上第二十五品二十七字四字平聲二十二字去聲陀羅尼品寧為多不是則為侵毀是三亦為擁護與亦為愍念以已上第二十六品六字四字平聲二字去聲嚴王品為現神變與師為是誰是當我等為父與為王説法與為欲發起以已上第二十七品五字一字平聲四字去聲普賢品名為説之與為諸佛護得為魔所著被亦為供養以名為旋陀是而為説法與不為女人被為諸如來得為千佛授得為釋迦牟得二不為三毒被不為淫妬被已上第二十八品一十三字一十平聲三字去聲都計六百一十八字二百九十一字平聲三百二十七字去聲第五通申作意者謂此門通釋五門大旨恐類古人只定訓作被二音不體餘之訓釋顯示後來未覺者知訓釋之由定佛語之要九義三義一乘五乘須明將曉喻法之體故云爾
